<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ローマ字れんしゅう｜ことば編</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fbf7ee; --ink:#2b3a4a; --ink-soft:#6b7a89; --line:#e7ddc7;
    --sky:#4f7cff; --sky-soft:#e8eeff; --marigold:#ffb23e;
    --grass:#37c26a; --grass-soft:#e2f8ea; --coral:#ff6b6b; --coral-soft:#ffe6e6;
    --hanamaru:#e8340c; --card:#fff; --shadow:0 10px 24px -12px rgba(43,58,74,.28);
    --sz:54px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"M PLUS Rounded 1c",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 80% at 50% -10%, #fff 0%, var(--paper) 55%),
      repeating-linear-gradient(transparent 0 46px, rgba(191,205,214,.18) 46px 47px);
    min-height:100%;display:flex;justify-content:center;
    padding:16px 14px calc(28px + env(safe-area-inset-bottom));
  }
  .app{width:100%;max-width:480px}

  header{display:flex;align-items:center;gap:10px;margin:6px 2px 16px}
  .logo{width:44px;height:44px;flex:none;border-radius:14px;background:var(--sky);
    display:grid;place-items:center;box-shadow:var(--shadow);transform:rotate(-6deg)}
  .logo svg{width:26px;height:26px}
  h1{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.28rem;margin:0}
  h1 small{display:block;font-family:"M PLUS Rounded 1c";font-weight:700;font-size:.68rem;
    color:var(--ink-soft);letter-spacing:.14em}

  .status{display:flex;align-items:center;gap:12px;margin:0 2px 16px}
  .bar{flex:1;height:14px;border-radius:99px;background:#eef1f4;overflow:hidden;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
  .bar>i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--sky),#7aa0ff);transition:width .35s cubic-bezier(.34,1.4,.5,1)}
  .qcount{font-weight:800;font-size:.9rem;color:var(--ink-soft);white-space:nowrap}
  .qcount b{color:var(--sky);font-size:1.02rem}
  .score{display:flex;align-items:center;gap:5px;font-weight:800;font-size:.92rem;background:#fff;
    border:2px solid var(--line);border-radius:99px;padding:5px 11px;box-shadow:var(--shadow)}
  .score svg{width:16px;height:16px}

  .panel{background:var(--card);border-radius:26px;box-shadow:var(--shadow);border:2px solid #fff;
    padding:24px 20px 26px}
  .panel h2{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.4rem;margin:.2rem 0 .1rem;text-align:center}
  .panel p.lead{color:var(--ink-soft);font-weight:500;margin:.3rem 0 1.3rem;line-height:1.7;
    text-align:center;font-size:.94rem}

  .field{margin-bottom:20px}
  .field>.lbl{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    font-weight:800;font-size:.88rem;margin-bottom:9px}
  .lbl em{font-style:normal;color:var(--sky);font-size:.82rem}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{flex:1;min-width:74px;font-family:inherit;font-weight:700;font-size:.9rem;
    color:var(--ink-soft);background:#f4f6f8;border:2.5px solid transparent;border-radius:14px;
    padding:11px 6px;cursor:pointer;transition:.12s}
  .seg button.on{background:var(--sky-soft);border-color:var(--sky);color:var(--sky)}

  /* ステージ選択 */
  .stages{display:flex;gap:8px;overflow-x:auto;padding:3px 2px 10px;scrollbar-width:thin}
  .stages button{flex:none;font-family:inherit;font-weight:800;font-size:.85rem;color:var(--ink-soft);
    background:#f4f6f8;border:2.5px solid transparent;border-radius:14px;padding:9px 13px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.25;transition:.12s}
  .stages button .no{font-size:.66rem;opacity:.65}
  .stages button.on{background:var(--sky);border-color:var(--sky);color:#fff}
  .stages button.on .no{opacity:.85}
  .stages button.inc{background:var(--sky-soft);color:var(--sky)}
  .stagenote{font-size:.82rem;color:var(--ink-soft);font-weight:600;margin:-4px 0 0;line-height:1.6}

  /* 単語えらび */
  .picker{border:2.5px solid var(--line);border-radius:16px;overflow:hidden}
  .picker>summary{list-style:none;cursor:pointer;padding:13px 15px;font-weight:800;font-size:.9rem;
    display:flex;align-items:center;justify-content:space-between;background:#faf8f3}
  .picker>summary::-webkit-details-marker{display:none}
  .picker>summary .cnt{color:var(--sky);font-size:.85rem}
  .picker>summary::after{content:"▾";color:var(--ink-soft);margin-left:8px;transition:transform .2s}
  .picker[open]>summary::after{transform:rotate(180deg)}
  .pickbody{max-height:340px;overflow-y:auto;padding:6px 13px 14px;border-top:2px solid var(--line)}
  .grp{margin-top:12px}
  .grphead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
  .grphead span{font-weight:800;font-size:.82rem;color:var(--ink)}
  .grphead button{font-family:inherit;font-size:.74rem;font-weight:700;color:var(--sky);
    background:var(--sky-soft);border:none;border-radius:9px;padding:5px 10px;cursor:pointer}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-family:"Zen Maru Gothic";font-weight:700;font-size:.92rem;color:var(--ink-soft);
    background:#f4f6f8;border:2px solid transparent;border-radius:10px;padding:6px 10px;cursor:pointer;transition:.1s}
  .chip.on{background:#fff;border-color:var(--sky);color:var(--sky)}
  .addrow{display:flex;gap:7px;margin-top:14px}
  .addrow input{flex:1;min-width:0;font-family:inherit;font-weight:700;font-size:.92rem;padding:11px 12px;
    border:2.5px solid var(--line);border-radius:13px;background:#fff;color:var(--ink)}
  .addrow input:focus{outline:none;border-color:var(--sky)}
  .addrow button{flex:none;font-family:inherit;font-weight:800;font-size:.9rem;color:#fff;background:var(--sky);
    border:none;border-radius:13px;padding:0 16px;cursor:pointer}
  .warn{color:var(--coral);font-size:.8rem;font-weight:700;margin:8px 0 0;min-height:1em}

  .start{width:100%;margin-top:6px;border:none;border-radius:18px;padding:18px;font-family:inherit;
    font-weight:800;font-size:1.12rem;color:#fff;background:var(--sky);cursor:pointer;
    box-shadow:0 6px 0 #3a63d6;transition:transform .08s,box-shadow .08s}
  .start:active{transform:translateY(3px);box-shadow:0 3px 0 #3a63d6}
  .start:disabled{background:#c3ccd8;box-shadow:0 6px 0 #a8b3c2;cursor:not-allowed}

  /* ---------- クイズ ---------- */
  .stage{position:relative;background:var(--card);border-radius:26px;box-shadow:var(--shadow);
    border:2px solid #fff;padding:24px 18px 22px;margin-bottom:16px;overflow:hidden}
  .stage::before{content:"";position:absolute;inset:9px;border:2px dashed var(--line);
    border-radius:19px;pointer-events:none}
  .meaning{position:relative;text-align:center;font-weight:700;color:var(--ink-soft);
    font-size:.95rem;min-height:1.2em}
  .word{position:relative;font-family:"Zen Maru Gothic";font-weight:900;line-height:1.1;text-align:center;
    font-size:clamp(2.4rem,13vw,3.4rem);letter-spacing:.06em;padding:4px 0 6px}
  .word.pop{animation:pop .45s cubic-bezier(.34,1.6,.5,1)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.09) rotate(-1.5deg)}100%{transform:scale(1)}}
  .sound{position:absolute;top:14px;right:14px;width:42px;height:42px;border-radius:13px;border:none;
    background:var(--sky-soft);color:var(--sky);display:grid;place-items:center;cursor:pointer;z-index:2}
  .sound:active{transform:scale(.9)}
  .sound svg{width:22px;height:22px}
  .hanamaru{position:absolute;top:46%;left:50%;width:min(72%,240px);height:auto;
    transform:translate(-50%,-50%) scale(0) rotate(-30deg);opacity:0;pointer-events:none;z-index:3}
  .hanamaru.show{animation:stamp .5s cubic-bezier(.2,1.5,.4,1) forwards}
  @keyframes stamp{0%{opacity:0;transform:translate(-50%,-50%) scale(1.7) rotate(-30deg)}
    60%{opacity:1}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-5deg)}}

  /* スロット */
  .slots{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:14px 0 4px;position:relative}
  .slot{width:var(--sz);height:calc(var(--sz) * 1.28);padding:0;border:2.5px solid var(--line);border-radius:11px;
    background:#fafbfc;display:grid;place-items:center;font-family:"M PLUS Rounded 1c";font-weight:800;
    font-size:calc(var(--sz) * .62);color:var(--ink);cursor:pointer;transition:.12s}
  .slot.filled{background:#fff;border-color:var(--sky);box-shadow:0 3px 0 #cfdcff}
  .slots.ok .slot{border-color:var(--grass);background:var(--grass-soft);color:#178a44;box-shadow:0 3px 0 #b7ecc9}
  .slots.ng .slot{border-color:var(--coral);background:var(--coral-soft);color:#c33;box-shadow:0 3px 0 #ffc9c9;
    animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .answerline{text-align:center;font-weight:800;font-size:1rem;color:var(--grass);min-height:1.4em;margin-top:8px}
  .answerline b{font-size:1.15rem}

  /* タイル */
  .tray{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:6px;min-height:52px}
  .tile{width:var(--sz);height:calc(var(--sz) * 1.28);border:2.5px solid var(--sky);border-radius:11px;
    background:#fff;font-family:"M PLUS Rounded 1c";font-weight:800;font-size:calc(var(--sz) * .62);
    color:var(--ink);cursor:pointer;box-shadow:0 4px 0 #cfdcff;transition:transform .08s,box-shadow .08s,opacity .15s}
  .tile:active{transform:translateY(3px);box-shadow:0 1px 0 #cfdcff}
  .tile.used{opacity:0;pointer-events:none}
  .toolrow{display:flex;gap:9px;margin-top:14px}
  .tool{flex:1;border:2.5px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:15px;
    padding:13px;font-family:inherit;font-weight:800;font-size:.95rem;cursor:pointer}
  .tool:active{transform:translateY(2px)}
  .next{width:100%;margin-top:14px;border:none;border-radius:18px;padding:17px;font-family:inherit;
    font-weight:800;font-size:1.06rem;color:#fff;cursor:pointer;background:var(--marigold);
    box-shadow:0 5px 0 #e0972b;display:none}
  .next:active{transform:translateY(3px);box-shadow:0 2px 0 #e0972b}
  .next.show{display:block;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

  /* 結果 */
  .medal{font-size:4.2rem;line-height:1;margin:.2rem 0 .1rem;animation:pop .5s cubic-bezier(.34,1.6,.5,1)}
  .bigscore{font-family:"Zen Maru Gothic";font-weight:900;font-size:2.9rem;color:var(--sky);line-height:1;text-align:center}
  .bigscore small{font-size:1.05rem;color:var(--ink-soft)}
  .rmsg{font-weight:700;text-align:center;margin:.4rem 0 1.1rem;font-size:1.02rem}
  .review h3{font-size:.83rem;font-weight:800;color:var(--ink-soft);margin:0 0 8px}
  .review ul{list-style:none;margin:0 0 18px;padding:0;display:flex;flex-direction:column;gap:8px}
  .review li{display:flex;align-items:center;gap:11px;background:#fff7f7;border:2px solid var(--coral-soft);
    border-radius:14px;padding:10px 13px}
  .review .rk{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.25rem;min-width:74px}
  .review .info{font-weight:700;font-size:.92rem}
  .review .info b{color:var(--grass)}
  .allright{background:var(--grass-soft);border:2px solid #bdeecd;border-radius:16px;padding:14px;
    font-weight:800;color:#178a44;margin-bottom:18px;text-align:center}
  .cta-row{display:flex;gap:9px;margin-top:4px}
  .ghost{flex:1;border:2.5px solid var(--line);background:#fff;color:var(--ink);border-radius:16px;
    padding:15px;font-family:inherit;font-weight:800;font-size:.98rem;cursor:pointer}

  .hidden{display:none!important}

  /* ===== iPad横・広い画面むけ 2カラム ===== */
  @media (min-width:860px) and (min-aspect-ratio:5/4){
    body{padding:22px 30px 34px}
    .app{max-width:1060px}
    header{margin:4px 2px 14px}
    .logo{width:50px;height:50px}
    h1{font-size:1.5rem}
    .status{margin-bottom:20px}
    .bar{height:16px}

    #quizScreen{display:grid;grid-template-columns:1.02fr .98fr;gap:26px;align-items:start}
    .stage{grid-column:1;grid-row:1 / 4;margin-bottom:0;padding:34px 22px 30px}
    .word{font-size:clamp(3rem,6.2vw,4.6rem)}
    .meaning{font-size:1.05rem}
    .hanamaru{width:min(76%,300px)}
    .tray{grid-column:2;grid-row:1;margin-top:0;gap:11px}
    .toolrow{grid-column:2;grid-row:2}
    .next{grid-column:2;grid-row:3;margin-top:0;padding:20px;font-size:1.15rem}
    .slot,.tile{width:calc(var(--sz) * 1.3);height:calc(var(--sz) * 1.66);
      font-size:calc(var(--sz) * .81)}
    .tool{padding:16px;font-size:1.02rem}
    .answerline{font-size:1.12rem}

    #setupScreen{display:grid;grid-template-columns:1fr 1fr;gap:0 32px;
      align-items:start;padding:28px 32px 34px}
    #setupScreen>h2{grid-area:1/1/2/-1;font-size:1.7rem}
    #setupScreen>p.lead{grid-area:2/1/3/-1;font-size:1.02rem}
    #setupScreen>.field:nth-of-type(1){grid-area:3/1/4/-1}
    #setupScreen>.field:nth-of-type(2){grid-area:4/1/7/2}
    #setupScreen>.field:nth-of-type(3){grid-area:4/2/5/3}
    #setupScreen>.field:nth-of-type(4){grid-area:5/2/6/3}
    #setupScreen>.field:nth-of-type(5){grid-area:6/2/7/3}
    #setupScreen>.start{grid-area:7/1/8/-1}
    .pickbody{max-height:44vh}
    .stages button{font-size:.92rem;padding:11px 16px}

    #resultScreen{display:grid;grid-template-columns:1fr 1fr;gap:0 32px;
      align-items:start;padding:30px 32px 34px}
    #resultScreen>.medal{grid-area:1/1/2/2}
    #resultScreen>.bigscore{grid-area:2/1/3/2}
    #resultScreen>.rmsg{grid-area:3/1/4/2}
    #resultScreen>#reviewBox{grid-area:1/2/6/3;max-height:56vh;overflow-y:auto}
    #resultScreen>.cta-row{grid-area:4/1/5/2}
    #resultScreen>#wrongBtn{grid-area:5/1/6/2}
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:3px solid var(--marigold);outline-offset:2px;border-radius:8px}
</style>
</head>
<body>
<div class="app">

  <header>
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 17.5 15.4 6.1a2 2 0 0 1 2.8 0l.7.7a2 2 0 0 1 0 2.8L7.5 21 3 22l1-4.5Z" fill="#fff"/><path d="m14 7.5 2.5 2.5" stroke="#4f7cff" stroke-width="1.6" stroke-linecap="round"/></svg>
    </span>
    <h1>ローマ字れんしゅう<small>ことば編 / WORDS</small></h1>
  </header>

  <div class="status hidden" id="status">
    <div class="bar"><i id="barFill"></i></div>
    <span class="qcount"><b id="qNow">1</b>/<span id="qTotal">10</span></span>
    <span class="score"><svg viewBox="0 0 24 24" fill="#ffb23e"><path d="m12 2 3 6.3 6.9.9-5 4.8 1.2 6.9L12 17.8 5.9 20.9 7.1 14l-5-4.8 6.9-.9L12 2Z"/></svg><span id="scoreVal">0</span></span>
  </div>

  <!-- ========== せってい ========== -->
  <section class="panel" id="setupScreen">
    <h2>ことばを ローマ字で</h2>
    <p class="lead">ひらがなの ことばを みて、<br>文字タイルを ならべて かこう。</p>

    <div class="field">
      <div class="lbl"><span>どこまで ならった？</span><em id="stageEm">あ行まで</em></div>
      <div class="stages" id="stageRow"></div>
      <p class="stagenote" id="stageNote"></p>
    </div>

    <div class="field">
      <details class="picker" id="picker">
        <summary>でる ことばを えらぶ <span class="cnt" id="pickCnt">0語</span></summary>
        <div class="pickbody" id="pickBody"></div>
      </details>
      <div class="addrow">
        <input id="addKana" type="text" placeholder="ひらがなで ことばを ついか" autocomplete="off" />
        <button id="addBtn" type="button">ついか</button>
      </div>
      <p class="warn" id="addWarn"></p>
    </div>

    <div class="field">
      <div class="lbl"><span>もんだいの かず</span></div>
      <div class="seg" id="countSeg">
        <button data-count="5">5もん</button>
        <button data-count="10" class="on">10もん</button>
        <button data-count="20">20もん</button>
        <button data-count="999">ぜんぶ</button>
      </div>
    </div>

    <div class="field">
      <div class="lbl"><span>ローマ字の かきかた</span><em id="styleEm">ヘボン式</em></div>
      <div class="seg" id="styleSeg">
        <button data-style="hepburn" class="on">ヘボン式（shi・tsu）</button>
        <button data-style="kunrei">訓令式（si・tu）</button>
      </div>
    </div>

    <div class="field">
      <div class="lbl"><span>アルファベット</span><em id="caseEm">小文字</em></div>
      <div class="seg" id="caseSeg">
        <button data-case="lower" class="on">小文字 abc</button>
        <button data-case="upper">大文字 ABC</button>
      </div>
    </div>

    <button class="start" id="startBtn">はじめる</button>
  </section>

  <!-- ========== クイズ ========== -->
  <section class="hidden" id="quizScreen">
    <div class="stage">
      <button class="sound" id="soundBtn" aria-label="よみあげる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
      </button>

  const s = style==='kunrei' ? 1 : 0;

    const m = mora[i];
    if (m==='*'){ const nx=mora[i+1]||''; out += nx.startsWith('ch')?'t':(nx[0]||''); continue; }

}

function stageOf(kana){
  let mx = 0;
  for (const ch of kana){
    let f = -1;
    for (let i=0;i<STAGES.length;i++) if (STAGES[i].c.includes(ch)){ f=i; break; }
    if (f < 0) return -1;
    if (f > mx) mx = f;
  }
  return mx;
}

  return {k, d, s:stageOf(k), custom:false};
});

    list.forEach(w=>{
      const c=document.createElement('button'); c.type='button';
      c.className='chip'+(chosen.has(w.k)?' on':'');
      c.textContent=w.k;
      c.title=w.d;
      c.addEventListener('click',()=>{
        chosen.has(w.k) ? chosen.delete(w.k) : chosen.add(w.k);
        c.classList.toggle('on');
        updateCount();
      });
      chips.appendChild(c);
    });
    g.appendChild(chips); body.appendChild(g);
  });
  updateCount();
}
function updateCount(){
  const n = WORDS.filter(w=>inRange(w) && chosen.has(w.k)).length;
  $('#pickCnt').textContent = n + '語';
  $('#startBtn').disabled = n === 0;
  $('#startBtn').textContent = n === 0 ? 'ことばを えらんでね' : 'はじめる';
}

/* ---------- 自分で追加 ---------- */
$('#addBtn').addEventListener('click',addWord);
$('#addKana').addEventListener('keydown',e=>{ if(e.key==='Enter') addWord(); });
function addWord(){
  const inp = $('#addKana'), warn = $('#addWarn');
  const k = inp.value.trim();
  warn.textContent='';
  if(!k) return;
  if(toRomaji(k,'hepburn')===null){ warn.textContent='ひらがなだけで いれてね（カタカナ・かん字は だめ）'; return; }
  if(WORDS.some(w=>w.k===k)){ warn.textContent='もう ある ことばだよ'; return; }
  WORDS.push({k, d:k, s:stageOf(k), custom:true});
  chosen.add(k);
  inp.value='';
  $('#picker').open = true;
  renderPicker();
}

/* ---------- セグメント ---------- */
$('#countSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); cfg.count=+b.dataset.count;
});
$('#caseSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); cfg.case=b.dataset.case;
  $('#caseEm').textContent = cfg.case==='upper' ? '大文字' : '小文字';
});
$('#styleSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); cfg.style=b.dataset.style;
  $('#styleEm').textContent = cfg.style==='kunrei' ? '訓令式' : 'ヘボン式';
});

/* ================= クイズ ================= */
function startQuiz(pool){
  const src = pool || WORDS.filter(w=>inRange(w) && chosen.has(w.k));
  if(!src.length) return;
  deck = shuffle([...src]).slice(0, Math.min(cfg.count, src.length));
  idx=0; score=0; wrongList=[];
  $('#qTotal').textContent = deck.length;
  $('#scoreVal').textContent = 0;
  $('#setupScreen').classList.add('hidden');
  $('#resultScreen').classList.add('hidden');
  $('#quizScreen').classList.remove('hidden');
  $('#status').classList.remove('hidden');
  render();
}

function render(){
  answered=false;
  const cur = deck[idx];
  answer = toRomaji(cur.k, cfg.style).replace(/'/g,'');
  if(cfg.case==='upper') answer = answer.toUpperCase();

  $('#qNow').textContent = idx+1;
  $('#barFill').style.width = (idx/deck.length*100)+'%';
  $('#meaning').textContent = (cur.d && cur.d!==cur.k) ? cur.d : '';
  const wt=$('#wordText'); wt.textContent = cur.k;
  wt.classList.remove('pop'); void wt.offsetWidth; wt.classList.add('pop');
  $('#hanamaru').classList.remove('show');
  $('#answerLine').textContent='';
  $('#nextBtn').classList.remove('show');
  $('#toolRow').classList.remove('hidden');

  // タイルの大きさを文字数にあわせる
  const n = answer.length;
  const sz = n<=4 ? 54 : n<=6 ? 48 : n<=8 ? 42 : n<=10 ? 38 : 34;
  document.documentElement.style.setProperty('--sz', sz+'px');

  // スロット
  slotVals = new Array(n).fill(null);
  const sl=$('#slots'); sl.className='slots'; sl.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('button'); d.type='button'; d.className='slot'; d.dataset.i=i;
    d.addEventListener('click',()=>unplace(i));
    sl.appendChild(d);
  }

  // タイル（正解の文字 ＋ ダミー）
  const extra = n<=4 ? 3 : 2;
  let alpha='aiueokstnhmyrwgzdbpjcf';
  if(cfg.case==='upper') alpha = alpha.toUpperCase();
  const dummy=[];
  while(dummy.length<extra){
    const ch = alpha[Math.random()*alpha.length|0];
    dummy.push(ch);
  }
  tiles = shuffle([...answer.split(''), ...dummy]).map((ch,i)=>({ch, id:i, used:false}));
  const tr=$('#tray'); tr.innerHTML='';
  tiles.forEach(t=>{
    const b=document.createElement('button'); b.type='button'; b.className='tile';
    b.textContent=t.ch; b.dataset.id=t.id;
    b.addEventListener('click',()=>place(t.id));
    tr.appendChild(b);
  });
}

function place(id){
  if(answered) return;
  const t = tiles.find(x=>x.id===id);
  if(!t || t.used) return;
  const i = slotVals.findIndex(v=>v===null);
  if(i<0) return;
  slotVals[i] = {ch:t.ch, id};
  t.used = true;
  paintSlots();
  if(slotVals.every(v=>v!==null)) setTimeout(check, 180);
}
function unplace(i){
  if(answered) return;
  const v = slotVals[i];
  if(!v) return;
  const t = tiles.find(x=>x.id===v.id);
  if(t) t.used=false;
  slotVals[i]=null;
  paintSlots();
}
function paintSlots(){
  const sl=$('#slots').children;
  slotVals.forEach((v,i)=>{
    sl[i].textContent = v ? v.ch : '';
    sl[i].classList.toggle('filled', !!v);
  });
  [...$('#tray').children].forEach(b=>{
    const t = tiles.find(x=>x.id===+b.dataset.id);
    b.classList.toggle('used', !!(t && t.used));
  });
}

function check(){
  const given = slotVals.map(v=>v.ch).join('');
  const cur = deck[idx];
  answered = true;
  const sl = $('#slots');
  if(given === answer){
    score++; $('#scoreVal').textContent = score;
    sl.classList.add('ok');
    $('#hanamaru').classList.add('show');
    const wt=$('#wordText'); wt.classList.remove('pop'); void wt.offsetWidth; wt.classList.add('pop');
  }else{
    sl.classList.add('ng');
    $('#answerLine').innerHTML = `せいかい → <b>${answer}</b>`;
    wrongList.push({k:cur.k, d:cur.d, right:answer, given, word:cur});
  }
  speak(cur.k);
  finish();
}
function finish(){
  answered = true;
  $('#barFill').style.width = ((idx+1)/deck.length*100)+'%';
  $('#toolRow').classList.add('hidden');
  const nb=$('#nextBtn');
  nb.textContent = (idx+1>=deck.length) ? 'けっかを みる →' : 'つぎへ →';
  nb.classList.add('show');
}

$('#clearBtn').addEventListener('click',()=>{
  if(answered) return;
  slotVals = slotVals.map(()=>null);
  tiles.forEach(t=>t.used=false);
  paintSlots();
});
$('#giveBtn').addEventListener('click',()=>{
  if(answered) return;
  const cur = deck[idx];
  $('#slots').classList.add('ng');
  slotVals = answer.split('').map(ch=>({ch, id:-1}));
  tiles.forEach(t=>t.used=true);
  paintSlots();
  $('#answerLine').innerHTML = `せいかい → <b>${answer}</b>`;
  wrongList.push({k:cur.k, d:cur.d, right:answer, given:'', word:cur});
  speak(cur.k);
  finish();
});
$('#nextBtn').addEventListener('click',()=>{
  if(idx+1>=deck.length){ showResult(); return; }
  idx++; render();
});

/* ---------- 読み上げ ---------- */
function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=.85;
    const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.startsWith('ja'));
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
$('#soundBtn').addEventListener('click',()=>speak($('#wordText').textContent));

/* ---------- 結果 ---------- */
function showResult(){
  $('#barFill').style.width='100%';
  $('#quizScreen').classList.add('hidden');
  $('#status').classList.add('hidden');
  const total=deck.length, pct=Math.round(score/total*100);
  $('#rScore').textContent=score; $('#rTotal').textContent=total;

  let medal='🌱', msg='まずは いっぽ！れんしゅう つづけよう。';
  if(pct===100){ medal='👑'; msg='パーフェクト！かんぺき！'; }
  else if(pct>=80){ medal='🏆'; msg='すごい！よく できました！'; }
  else if(pct>=60){ medal='🎉'; msg='いいちょうし！あと すこし！'; }
  else if(pct>=40){ medal='💪'; msg='がんばった！もういちど！'; }
  $('#medal').textContent=medal; $('#rMsg').textContent=msg;

  const box=$('#reviewBox');
  if(!wrongList.length){
    box.innerHTML='<div class="allright">まちがい なし！はなまる 💮</div>';
    $('#wrongBtn').classList.add('hidden');
  }else{
    const items=wrongList.map(w=>
      `<li><span class="rk">${w.k}</span><span class="info">せいかい <b>${w.right}</b>${w.given?` ／ あなた ${w.given}`:''}</span></li>`
    ).join('');
    box.innerHTML=`<div class="review"><h3>まちがえた ことば（${wrongList.length}）</h3><ul>${items}</ul></div>`;
    $('#wrongBtn').classList.remove('hidden');
  }
  $('#resultScreen').classList.remove('hidden');
}

$('#startBtn').addEventListener('click',()=>startQuiz());
$('#retryBtn').addEventListener('click',()=>startQuiz());
$('#wrongBtn').addEventListener('click',()=>{
  const pool = wrongList.map(w=>w.word);
  const saved = cfg.count; cfg.count = 999;
  startQuiz(pool); cfg.count = saved;
});
$('#homeBtn').addEventListener('click',()=>{
  $('#resultScreen').classList.add('hidden');
  $('#setupScreen').classList.remove('hidden');
});

/* ---------- 初期化 ---------- */
paintStages();
resetChosen();
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=()=>{}; }
</script>
</body>
