<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ローマ字れんしゅう</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fbf7ee;        /* ノートの紙 */
    --ink:#2b3a4a;          /* 文字 */
    --ink-soft:#6b7a89;
    --line:#e7ddc7;         /* ノートの罫線 */
    --sky:#4f7cff;          /* メインの青 */
    --sky-soft:#e8eeff;
    --marigold:#ffb23e;     /* さし色 */
    --grass:#37c26a;        /* 正解 */
    --grass-soft:#e2f8ea;
    --coral:#ff6b6b;        /* 不正解 */
    --coral-soft:#ffe6e6;
    --hanamaru:#e8340c;     /* はなまるの赤 */
    --card:#ffffff;
    --shadow:0 10px 24px -12px rgba(43,58,74,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"M PLUS Rounded 1c",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #fff 0%, var(--paper) 55%),
      repeating-linear-gradient(transparent 0 46px, rgba(191,205,214,.18) 46px 47px);
    min-height:100%;
    display:flex;justify-content:center;
    padding:16px 14px calc(28px + env(safe-area-inset-bottom));
  }
  .app{width:100%;max-width:460px;position:relative}

  /* ---------- ヘッダー ---------- */
  header{display:flex;align-items:center;gap:10px;margin:6px 2px 16px}
  .logo{
    width:44px;height:44px;flex:none;border-radius:14px;
    background:var(--sky);display:grid;place-items:center;box-shadow:var(--shadow);
    transform:rotate(-6deg);
  }
  .logo svg{width:26px;height:26px}
  h1{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.32rem;margin:0;letter-spacing:.02em}
  h1 small{display:block;font-family:"M PLUS Rounded 1c";font-weight:700;font-size:.7rem;color:var(--ink-soft);letter-spacing:.14em}

  /* ---------- 進捗＆スコア ---------- */
  .status{display:flex;align-items:center;gap:12px;margin:0 2px 18px}
  .bar{flex:1;height:14px;border-radius:99px;background:#eef1f4;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
  .bar > i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--sky),#7aa0ff);transition:width .35s cubic-bezier(.34,1.4,.5,1)}
  .qcount{font-weight:800;font-size:.92rem;color:var(--ink-soft);white-space:nowrap}
  .qcount b{color:var(--sky);font-size:1.05rem}
  .score{display:flex;align-items:center;gap:5px;font-weight:800;font-size:.95rem;
    background:#fff;border:2px solid var(--line);border-radius:99px;padding:5px 12px;box-shadow:var(--shadow)}
  .score svg{width:17px;height:17px}

  /* ---------- かなカード ---------- */
  .stage{position:relative;background:var(--card);border-radius:28px;box-shadow:var(--shadow);
    border:2px solid #fff;padding:30px 22px 26px;margin-bottom:20px;overflow:hidden}
  .stage::before{content:"";position:absolute;inset:10px;border:2px dashed var(--line);border-radius:20px;pointer-events:none}
  .prompt{position:relative;text-align:center;font-weight:700;color:var(--ink-soft);font-size:.9rem;margin-bottom:6px}
  .kana{position:relative;font-family:"Zen Maru Gothic";font-weight:900;line-height:1;
    text-align:center;font-size:clamp(5.2rem,34vw,7.4rem);color:var(--ink);
    padding:6px 0 10px;transition:transform .2s}
  .kana.pop{animation:pop .45s cubic-bezier(.34,1.6,.5,1)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12) rotate(-2deg)}100%{transform:scale(1)}}
  .sound{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:14px;border:none;
    background:var(--sky-soft);color:var(--sky);display:grid;place-items:center;cursor:pointer;transition:transform .12s,background .12s}
  .sound:hover{background:#dbe6ff}
  .sound:active{transform:scale(.9)}
  .sound svg{width:24px;height:24px}

  /* はなまる（正解スタンプ） */
  .hanamaru{position:absolute;top:50%;left:50%;width:min(74%,265px);height:auto;
    transform:translate(-50%,-50%) scale(0) rotate(-30deg);opacity:0;pointer-events:none;z-index:3}
  .hanamaru.show{animation:stamp .5s cubic-bezier(.2,1.5,.4,1) forwards}
  @keyframes stamp{0%{opacity:0;transform:translate(-50%,-50%) scale(1.7) rotate(-30deg)}
    60%{opacity:1}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-5deg)}}

  /* ---------- 選択肢 ---------- */
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .choice{position:relative;font-family:"M PLUS Rounded 1c";font-weight:800;font-size:1.6rem;
    letter-spacing:.02em;color:var(--ink);background:#fff;border:2.5px solid var(--line);
    border-radius:18px;padding:20px 8px;cursor:pointer;box-shadow:0 4px 0 var(--line);
    transition:transform .08s,box-shadow .08s,border-color .15s,background .15s}
  .choice .key{position:absolute;top:7px;left:10px;font-size:.72rem;font-weight:700;color:var(--ink-soft);opacity:.6}
  .choice:hover:not(:disabled){border-color:var(--sky);transform:translateY(-1px)}
  .choice:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
  .choice:disabled{cursor:default}
  .choice.correct{background:var(--grass-soft);border-color:var(--grass);color:#178a44;box-shadow:0 4px 0 #b7ecc9}
  .choice.wrong{background:var(--coral-soft);border-color:var(--coral);color:#c33;box-shadow:0 4px 0 #ffc9c9}
  .choice.dim{opacity:.45}
  .choice .mark{position:absolute;top:6px;right:10px;font-size:1.15rem;font-weight:900}

  /* 次へ */
  .next{width:100%;margin-top:18px;border:none;border-radius:18px;padding:17px;
    font-family:"M PLUS Rounded 1c";font-weight:800;font-size:1.08rem;color:#fff;cursor:pointer;
    background:var(--marigold);box-shadow:0 5px 0 #e0972b;transition:transform .08s,box-shadow .08s;
    display:none}
  .next:active{transform:translateY(3px);box-shadow:0 2px 0 #e0972b}
  .next.show{display:block;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

  /* ---------- スタート / 結果画面 ---------- */
  .panel{background:var(--card);border-radius:28px;box-shadow:var(--shadow);border:2px solid #fff;
    padding:28px 24px 30px;text-align:center}
  .panel h2{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.5rem;margin:.2rem 0 .1rem}
  .panel p.lead{color:var(--ink-soft);font-weight:500;margin:.2rem 0 1.4rem;line-height:1.7}
  .field{text-align:left;margin-bottom:18px}
  .field > span{display:block;font-weight:800;font-size:.85rem;margin-bottom:8px;color:var(--ink)}
  .field > span em{color:var(--sky);font-style:normal}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{flex:1;min-width:72px;font-family:inherit;font-weight:700;font-size:.92rem;color:var(--ink-soft);
    background:#f4f6f8;border:2.5px solid transparent;border-radius:14px;padding:12px 6px;cursor:pointer;transition:.12s}
  .seg button.on{background:var(--sky-soft);border-color:var(--sky);color:var(--sky)}
  .start{width:100%;margin-top:8px;border:none;border-radius:18px;padding:18px;font-family:inherit;
    font-weight:800;font-size:1.15rem;color:#fff;background:var(--sky);cursor:pointer;
    box-shadow:0 6px 0 #3a63d6;transition:transform .08s,box-shadow .08s}
  .start:active{transform:translateY(3px);box-shadow:0 3px 0 #3a63d6}

  /* 結果 */
  .medal{font-size:4.4rem;line-height:1;margin:.2rem 0 .1rem;animation:pop .5s cubic-bezier(.34,1.6,.5,1)}
  .bigscore{font-family:"Zen Maru Gothic";font-weight:900;font-size:3rem;color:var(--sky);line-height:1}
  .bigscore small{font-size:1.1rem;color:var(--ink-soft)}
  .rmsg{font-weight:700;color:var(--ink);margin:.4rem 0 1.2rem;font-size:1.05rem}
  .review{text-align:left;margin:6px 0 20px}
  .review h3{font-size:.85rem;font-weight:800;color:var(--ink-soft);margin:0 0 8px;letter-spacing:.05em}
  .review ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .review li{display:flex;align-items:center;gap:12px;background:#fff7f7;border:2px solid var(--coral-soft);
    border-radius:14px;padding:10px 14px}
  .review .rk{font-family:"Zen Maru Gothic";font-weight:900;font-size:1.7rem;width:44px;text-align:center}
  .review .info{font-weight:700;font-size:.95rem}
  .review .info b{color:var(--grass)}
  .review .info s{color:var(--coral);text-decoration-thickness:2px}
  .allright{background:var(--grass-soft);border:2px solid #bdeecd;border-radius:16px;padding:14px;
    font-weight:800;color:#178a44;margin-bottom:20px}

  .hidden{display:none}
  .cta-row{display:flex;gap:10px}
  .ghost{flex:1;border:2.5px solid var(--line);background:#fff;color:var(--ink);border-radius:16px;
    padding:15px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer}
  .ghost:active{transform:translateY(2px)}


  /* ===== iPad横・広い画面むけ 2カラム ===== */
  @media (min-width:860px) and (min-aspect-ratio:5/4){
    body{padding:22px 30px 34px}
    .app{max-width:1020px}
    header{margin:4px 2px 14px}
    .logo{width:50px;height:50px}
    h1{font-size:1.5rem}
    .status{margin-bottom:20px}
    .bar{height:16px}

    #quizScreen{display:grid;grid-template-columns:1.05fr .95fr;gap:26px;align-items:start}
    .stage{grid-column:1;grid-row:1 / 3;margin-bottom:0;padding:44px 26px 40px}
    .kana{font-size:clamp(6rem,12vw,9.5rem)}
    .prompt{font-size:1rem}
    .hanamaru{width:min(76%,330px)}
    .choices{grid-column:2;grid-row:1;gap:16px}
    .choice{font-size:2.1rem;padding:34px 8px;border-radius:22px}
    .choice .key{font-size:.85rem;top:10px;left:14px}
    .next{grid-column:2;grid-row:2;margin-top:0;padding:20px;font-size:1.15rem}

    #startScreen{display:grid;grid-template-columns:1fr 1fr;gap:0 32px;
      align-items:start;padding:30px 32px 34px}
    #startScreen>.medal{grid-area:1/1/2/-1}
    #startScreen>h2{grid-area:2/1/3/-1;font-size:1.7rem}
    #startScreen>p.lead{grid-area:3/1/4/-1;font-size:1.02rem}
    #startScreen>.field:nth-of-type(2){grid-area:4/1/5/2}
    #startScreen>.field:nth-of-type(3){grid-area:4/2/5/3}
    #startScreen>.field:nth-of-type(4){grid-area:5/1/6/2}
    #startScreen>.field:nth-of-type(5){grid-area:5/2/6/3}
    #startScreen>.start{grid-area:6/1/7/-1}

    #resultScreen{display:grid;grid-template-columns:1fr 1fr;gap:0 32px;
      align-items:start;padding:30px 32px 34px}
    #resultScreen>.medal{grid-area:1/1/2/2}
    #resultScreen>.bigscore{grid-area:2/1/3/2}
    #resultScreen>.rmsg{grid-area:3/1/4/2}
    #resultScreen>#reviewBox{grid-area:1/2/5/3;max-height:56vh;overflow-y:auto}
    #resultScreen>.cta-row{grid-area:4/1/5/2}
  }
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:3px solid var(--marigold);outline-offset:2px;border-radius:8px}
</style>
</head>
<body>
<div class="app">

  <header>
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 17.5 15.4 6.1a2 2 0 0 1 2.8 0l.7.7a2 2 0 0 1 0 2.8L7.5 21 3 22l1-4.5Z" fill="#fff"/><path d="m14 7.5 2.5 2.5" stroke="#4f7cff" stroke-width="1.6" stroke-linecap="round"/></svg>
    </span>
    <h1>ローマ字れんしゅう<small>ROMAJI QUIZ</small></h1>
  </header>

  <!-- ステータス（クイズ中のみ表示） -->
  <div class="status hidden" id="status">
    <div class="bar"><i id="barFill"></i></div>
    <span class="qcount"><b id="qNow">1</b>/<span id="qTotal">20</span></span>
    <span class="score"><svg viewBox="0 0 24 24" fill="#ffb23e"><path d="m12 2 3 6.3 6.9.9-5 4.8 1.2 6.9L12 17.8 5.9 20.9 7.1 14l-5-4.8 6.9-.9L12 2Z"/></svg><span id="scoreVal">0</span></span>
  </div>

  <!-- スタート画面 -->
  <section class="panel" id="startScreen">
    <div class="medal" style="font-size:3.4rem">🖊️</div>
    <h2>ひらがな → ローマ字</h2>
    <p class="lead">でてくる ひらがなを みて、<br>ただしい ローマ字を えらんでね。</p>

    <div class="field">
      <span>どの もじを れんしゅうする？</span>
      <div class="seg" id="levelSeg">
        <button data-level="kihon" class="on">きほん</button>
        <button data-level="dakuon">だくおん</button>
        <button data-level="yoon">ようおん</button>
        <button data-level="all">ぜんぶ</button>
      </div>
    </div>

    <div class="field">
      <span>もんだいの かず</span>
      <div class="seg" id="countSeg">
        <button data-count="10">10もん</button>
        <button data-count="20" class="on">20もん</button>
        <button data-count="999">ぜんぶ</button>
      </div>
    </div>

    <div class="field">
      <span>ローマ字の かきかた <em id="styleHint">ヘボン式</em></span>
      <div class="seg" id="styleSeg">
        <button data-style="hepburn" class="on">ヘボン式（shi）</button>
        <button data-style="kunrei">訓令式（si）</button>
      </div>
    </div>

    <div class="field">
      <span>アルファベット <em id="caseHint">小文字</em></span>
      <div class="seg" id="caseSeg">
        <button data-case="lower" class="on">小文字 abc</button>
        <button data-case="upper">大文字 ABC</button>
      </div>
    </div>

    <button class="start" id="startBtn">はじめる</button>
  </section>

  <!-- クイズ画面 -->
  <section class="hidden" id="quizScreen">
    <div class="stage">
      <button class="sound" id="soundBtn" aria-label="よみあげる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
      </button>

    <div class="bigscore"><span id="rScore">0</span><small>/<span id="rTotal">20</span></small></div>
    <p class="rmsg" id="rMsg">よくできました！</p>
    <div id="reviewBox"></div>
    <div class="cta-row">
      <button class="ghost" id="homeBtn">さいしょへ</button>
      <button class="start" style="flex:1;margin-top:0;box-shadow:0 6px 0 #3a63d6" id="retryBtn">もういちど</button>
    </div>
  </section>

</div>

<script>
/* ========== データ（ひらがな → ローマ字） ========== */
/* h = ヘボン式, kun = 訓令式（省略時は h と同じ） */
const DATA = {
  kihon: [
    {k:'あ',h:'a'},{k:'い',h:'i'},{k:'う',h:'u'},{k:'え',h:'e'},{k:'お',h:'o'},
    {k:'か',h:'ka'},{k:'き',h:'ki'},{k:'く',h:'ku'},{k:'け',h:'ke'},{k:'こ',h:'ko'},
    {k:'さ',h:'sa'},{k:'し',h:'shi',kun:'si'},{k:'す',h:'su'},{k:'せ',h:'se'},{k:'そ',h:'so'},
    {k:'た',h:'ta'},{k:'ち',h:'chi',kun:'ti'},{k:'つ',h:'tsu',kun:'tu'},{k:'て',h:'te'},{k:'と',h:'to'},
    {k:'な',h:'na'},{k:'に',h:'ni'},{k:'ぬ',h:'nu'},{k:'ね',h:'ne'},{k:'の',h:'no'},
    {k:'は',h:'ha'},{k:'ひ',h:'hi'},{k:'ふ',h:'fu',kun:'hu'},{k:'へ',h:'he'},{k:'ほ',h:'ho'},
    {k:'ま',h:'ma'},{k:'み',h:'mi'},{k:'む',h:'mu'},{k:'め',h:'me'},{k:'も',h:'mo'},
    {k:'や',h:'ya'},{k:'ゆ',h:'yu'},{k:'よ',h:'yo'},
    {k:'ら',h:'ra'},{k:'り',h:'ri'},{k:'る',h:'ru'},{k:'れ',h:'re'},{k:'ろ',h:'ro'},
    {k:'わ',h:'wa'},{k:'を',h:'wo',kun:'o'},{k:'ん',h:'n'}
  ],
  dakuon: [
    {k:'が',h:'ga'},{k:'ぎ',h:'gi'},{k:'ぐ',h:'gu'},{k:'げ',h:'ge'},{k:'ご',h:'go'},
    {k:'ざ',h:'za'},{k:'じ',h:'ji',kun:'zi'},{k:'ず',h:'zu'},{k:'ぜ',h:'ze'},{k:'ぞ',h:'zo'},
    {k:'だ',h:'da'},{k:'ぢ',h:'ji',kun:'di'},{k:'づ',h:'zu',kun:'du'},{k:'で',h:'de'},{k:'ど',h:'do'},
    {k:'ば',h:'ba'},{k:'び',h:'bi'},{k:'ぶ',h:'bu'},{k:'べ',h:'be'},{k:'ぼ',h:'bo'},
    {k:'ぱ',h:'pa'},{k:'ぴ',h:'pi'},{k:'ぷ',h:'pu'},{k:'ぺ',h:'pe'},{k:'ぽ',h:'po'}
  ],
  yoon: [
    {k:'きゃ',h:'kya'},{k:'きゅ',h:'kyu'},{k:'きょ',h:'kyo'},
    {k:'しゃ',h:'sha',kun:'sya'},{k:'しゅ',h:'shu',kun:'syu'},{k:'しょ',h:'sho',kun:'syo'},
    {k:'ちゃ',h:'cha',kun:'tya'},{k:'ちゅ',h:'chu',kun:'tyu'},{k:'ちょ',h:'cho',kun:'tyo'},
    {k:'にゃ',h:'nya'},{k:'にゅ',h:'nyu'},{k:'にょ',h:'nyo'},
    {k:'ひゃ',h:'hya'},{k:'ひゅ',h:'hyu'},{k:'ひょ',h:'hyo'},
    {k:'みゃ',h:'mya'},{k:'みゅ',h:'myu'},{k:'みょ',h:'myo'},
    {k:'りゃ',h:'rya'},{k:'りゅ',h:'ryu'},{k:'りょ',h:'ryo'},
    {k:'ぎゃ',h:'gya'},{k:'ぎゅ',h:'gyu'},{k:'ぎょ',h:'gyo'},
    {k:'じゃ',h:'ja',kun:'zya'},{k:'じゅ',h:'ju',kun:'zyu'},{k:'じょ',h:'jo',kun:'zyo'},
    {k:'びゃ',h:'bya'},{k:'びゅ',h:'byu'},{k:'びょ',h:'byo'},
    {k:'ぴゃ',h:'pya'},{k:'ぴゅ',h:'pyu'},{k:'ぴょ',h:'pyo'}
  ]
};

/* ========== 状態 ========== */
const cfg = {level:'kihon', count:20, style:'hepburn', case:'lower'};
let deck=[], idx=0, score=0, answered=false, wrongList=[], keyLetters=['①','②','③','④'];

const $ = s=>document.querySelector(s);
const roma = e => cfg.style==='kunrei' ? (e.kun||e.h) : e.h;
const disp = v => cfg.case==='upper' ? v.toUpperCase() : v;
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

/* ---- スタート画面の選択トグル ---- */
function bindSeg(id, key, after){
  $('#'+id).addEventListener('click', e=>{
    const b=e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    cfg[key]= b.dataset[key] ?? b.dataset.level ?? b.dataset.count ?? b.dataset.style;
    if(after) after();
  });
}
bindSeg('levelSeg','level');
bindSeg('countSeg','count', ()=>{cfg.count=+$('#countSeg .on').dataset.count;});
bindSeg('styleSeg','style', ()=>{
  cfg.style=$('#styleSeg .on').dataset.style;
  $('#styleHint').textContent = cfg.style==='kunrei' ? '訓令式' : 'ヘボン式';
});
bindSeg('caseSeg','case', ()=>{
  cfg.case=$('#caseSeg .on').dataset.case;
  $('#caseHint').textContent = cfg.case==='upper' ? '大文字' : '小文字';
});
$('#levelSeg').addEventListener('click',()=>cfg.level=$('#levelSeg .on').dataset.level);

/* ---- プール構築 ---- */
function buildPool(){
  if(cfg.level==='all') return [...DATA.kihon,...DATA.dakuon,...DATA.yoon];
  return [...DATA[cfg.level]];
}

/* ---- クイズ開始 ---- */
function startQuiz(){
  const pool = buildPool();
  const n = Math.min(cfg.count, pool.length);
  deck = shuffle([...pool]).slice(0,n);
  idx=0; score=0; wrongList=[]; answered=false;
  $('#qTotal').textContent = deck.length;
  $('#scoreVal').textContent = 0;
  $('#startScreen').classList.add('hidden');
  $('#resultScreen').classList.add('hidden');
  $('#quizScreen').classList.remove('hidden');
  $('#status').classList.remove('hidden');
  renderQuestion();
}

/* ---- 1問を描画 ---- */
function renderQuestion(){
  answered=false;
  const cur = deck[idx];
  const answer = roma(cur);

  // 進捗・スコア
  $('#qNow').textContent = idx+1;
  $('#barFill').style.width = (idx/deck.length*100)+'%';

  // かな
  const kanaEl=$('#kanaText');
  kanaEl.textContent = cur.k;
  kanaEl.classList.remove('pop'); void kanaEl.offsetWidth; kanaEl.classList.add('pop');
  $('#hanamaru').classList.remove('show');

  // 選択肢（同じプールから紛らわしいダミーを作る）
  const pool = buildPool().map(roma).filter((v,i,a)=>a.indexOf(v)===i);
  const distractors = shuffle(pool.filter(v=>v!==answer)).slice(0,3);
  const opts = shuffle([answer, ...distractors]);

  const box=$('#choices'); box.innerHTML='';
  opts.forEach((v,i)=>{
    const b=document.createElement('button');
    b.className='choice'; b.type='button';
    b.innerHTML=`<span class="key">${keyLetters[i]}</span>${disp(v)}<span class="mark"></span>`;
    b.dataset.val=v;
    b.addEventListener('click',()=>choose(b, v, answer, cur));
    box.appendChild(b);
  });

  $('#nextBtn').classList.remove('show');
}

/* ---- 回答 ---- */
function choose(btn, val, answer, cur){
  if(answered) return;
  answered=true;
  const correct = val===answer;
  const buttons=[...$('#choices').children];

  buttons.forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===answer){ b.classList.add('correct'); b.querySelector('.mark').textContent='○'; }
    else if(b===btn){ b.classList.add('wrong'); b.querySelector('.mark').textContent='✕'; }
    else b.classList.add('dim');
  });

  if(correct){
    score++;
    $('#scoreVal').textContent=score;
    $('#hanamaru').classList.add('show');
    const k=$('#kanaText'); k.classList.remove('pop'); void k.offsetWidth; k.classList.add('pop');
  }else{
    wrongList.push({k:cur.k, right:answer, picked:val});
  }
  speak(cur.k);
  $('#barFill').style.width = ((idx+1)/deck.length*100)+'%';
  $('#nextBtn').textContent = (idx+1>=deck.length) ? 'けっかを みる →' : 'つぎへ →';
  $('#nextBtn').classList.add('show');
}

$('#nextBtn').addEventListener('click',()=>{
  if(idx+1>=deck.length){ showResult(); return; }
  idx++; renderQuestion();
});

/* ---- 読み上げ（対応端末のみ） ---- */
function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=.85;
    const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.startsWith('ja'));
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
$('#soundBtn').addEventListener('click',()=>speak($('#kanaText').textContent));

/* ---- 結果 ---- */
function showResult(){
  $('#barFill').style.width='100%';
  $('#quizScreen').classList.add('hidden');
  $('#status').classList.add('hidden');
  const total=deck.length, pct=Math.round(score/total*100);
  $('#rScore').textContent=score; $('#rTotal').textContent=total;

  let medal='🌱', msg='まずは いっぽ！れんしゅうを つづけよう。';
  if(pct===100){ medal='👑'; msg='パーフェクト！かんぺきだね！'; }
  else if(pct>=80){ medal='🏆'; msg='すごい！よく できました！'; }
  else if(pct>=60){ medal='🎉'; msg='いいちょうし！あと すこし！'; }
  else if(pct>=40){ medal='💪'; msg='がんばった！もういちど チャレンジ！'; }
  $('#medal').textContent=medal;
  $('#rMsg').textContent=msg;

  const box=$('#reviewBox');
  if(wrongList.length===0){
    box.innerHTML='<div class="allright">まちがい なし！はなまる 💮</div>';
  }else{
    const items=wrongList.map(w=>
      `<li><span class="rk">${w.k}</span><span class="info">せいかい <b>${disp(w.right)}</b> ／ あなた <s>${disp(w.picked)}</s></span></li>`
    ).join('');
    box.innerHTML=`<div class="review"><h3>まちがえた もじ（${wrongList.length}）</h3><ul>${items}</ul></div>`;
  }
  $('#resultScreen').classList.remove('hidden');
}

/* ---- ボタン ---- */
$('#startBtn').addEventListener('click',startQuiz);
$('#retryBtn').addEventListener('click',startQuiz);
$('#homeBtn').addEventListener('click',()=>{
  $('#resultScreen').classList.add('hidden');
  $('#startScreen').classList.remove('hidden');
});

// 音声リストの遅延ロード対策
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=()=>{}; }
</script>
</body>
</html>
